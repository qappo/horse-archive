<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horsey Web - 管理后台</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="site-shell admin-shell">
    <header class="site-header">
      <a class="button button-secondary" href="index.html">返回图鉴</a>
      <div class="header-actions" id="header-actions"></div>
    </header>

    <main class="page">
      <section class="admin-head">
        <p class="section-kicker">Admin</p>
        <h1 class="section-title">管理后台</h1>
      </section>

      <nav class="admin-tabs" aria-label="后台栏目">
        <button class="admin-tab active" data-admin-tab="users" type="button">用户</button>
        <button class="admin-tab" data-admin-tab="horses" type="button">马匹</button>
        <button class="admin-tab" data-admin-tab="comments" type="button">评论</button>
        <button class="admin-tab" data-admin-tab="emojis" type="button">Emoji</button>
      </nav>

      <div class="status-box" id="admin-status">正在读取后台数据...</div>
      <section class="admin-table-wrap" id="admin-content"></section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
