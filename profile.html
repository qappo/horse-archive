<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horse_Archive - 个人主页</title>
  <link rel="icon" type="image/png" href="assets/rabbit.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="button button-secondary" href="index.html">返回图鉴</a>
      <div class="header-actions" id="header-actions"></div>
    </header>

    <main class="page">
      <section class="profile-panel">
        <div class="profile-head">
          <div class="profile-avatar-wrap">
            <img id="profile-avatar" alt="头像">
          </div>
          <div>
            <p class="section-kicker">Profile</p>
            <h1 class="section-title" id="profile-title">个人主页</h1>
            <p class="profile-meta" id="profile-meta"></p>
          </div>
        </div>

        <form class="profile-form hidden" id="profile-form">
          <label class="field-label" for="profile-name">名字</label>
          <input id="profile-name" type="text" minlength="3" maxlength="40" required>

          <label class="field-label" for="avatar-file">头像图片</label>
          <input id="avatar-file" type="file" accept="image/*">

          <button class="button" type="submit">保存资料</button>
        </form>
        <div class="status-box hidden" id="profile-status"></div>
      </section>

      <section class="section-header">
        <div>
          <p class="section-kicker">Stable</p>
          <h2 class="section-title" id="profile-horses-title">发布的马</h2>
        </div>
        <p class="section-meta" id="profile-horses-count">加载中...</p>
      </section>

      <section>
        <div class="status-box" id="profile-horses-status">正在读取发布的马...</div>
        <div class="horse-grid" id="profile-horse-grid"></div>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/horses.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
