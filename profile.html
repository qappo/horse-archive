<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horsey Web - 上传头像</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="button button-secondary" href="index.html">返回图鉴</a>
      <div class="header-actions" id="header-actions"></div>
    </header>

    <main class="page">
      <section class="profile-panel">
        <div class="section-header">
          <div>
            <p class="section-kicker">Profile</p>
            <h1 class="section-title">上传头像</h1>
          </div>
        </div>

        <div class="profile-avatar-wrap">
          <img id="profile-avatar" alt="头像">
        </div>

        <form class="profile-form" id="avatar-form">
          <label class="field-label" for="avatar-file">选择头像图片</label>
          <input id="avatar-file" type="file" accept="image/*">

          <label class="field-label" for="avatar-url">或直接填写头像图片 URL</label>
          <input id="avatar-url" type="url" placeholder="https://example.com/avatar.png">

          <button class="button" type="submit">保存头像</button>
        </form>
        <div class="status-box hidden" id="profile-status"></div>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
