<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horse_Archive - 首页</title>
  <link rel="icon" type="image/png" href="assets/rabbit2.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div>
        <p class="site-eyebrow">Tsukimi_ichigo's</p>
        <h1 class="site-title">Horse_Archive</h1>
      </div>
      <div class="header-actions" id="header-actions"></div>
    </header>

    <main class="page page-home">
      <section class="hero-panel">
        <div>
          <h2>欢迎来到月见莓の马小屋！！🌈</h2>
          <p class="hero-text">今天是网站测试第一周，请踊跃提交反馈！（点击右边创建新马）</p>
        </div>
        <div class="inline-actions">
          <a class="button button-secondary" href="favorites.html">我的收藏</a>
          <a class="button" href="upload.html">创建新马</a>
        </div>
      </section>

      <section class="home-avatar-panel hidden" id="home-avatar-panel">
        <div>
          <p class="section-kicker">Avatar</p>
          <h2 class="section-title">上传头像</h2>
        </div>
        <div class="home-avatar-content">
          <div class="home-avatar-preview">
            <img id="home-avatar-preview" alt="头像">
          </div>
          <form class="home-avatar-form" id="home-avatar-form">
            <label class="field-label" for="home-avatar-file">选择头像图片</label>
            <input id="home-avatar-file" type="file" accept="image/*" required>
            <button class="button" type="submit">保存头像</button>
          </form>
        </div>
        <div class="status-box hidden" id="home-avatar-status"></div>
      </section>

      <section class="section-header">
        <div>
          <p class="section-kicker">Archive</p>
          <h2 class="section-title">马匹列表</h2>
        </div>
        <p class="section-meta" id="horse-count">加载中...</p>
      </section>

      <section>
        <div class="status-box" id="home-status">正在读取马匹数据...</div>
        <div class="horse-grid" id="horse-grid"></div>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/horses.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
