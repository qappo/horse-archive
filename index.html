<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horsey Web - 马匹图鉴</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div>
        <p class="site-eyebrow">Tsukimi_ichigo's</p>
        <h1 class="site-title">Horse_Archive</h1>
      </div>
      <div class="header-actions" id="header-actions"></div>
    </header>

    <main class="page page-home">
      <section class="hero-panel">
        <div>
          <h2>欢迎来到月见莓の马小屋！！🌈</h2>
          <p class="hero-text">今天是网站测试第一天，请踊跃提交反馈。（点击右边创建新马）</p>
        </div>
        <div class="inline-actions">
          <a class="button" href="upload.html">创建新马</a>
        </div>
      </section>

      <section class="section-header">
        <div>
          <p class="section-kicker">Archive</p>
          <h2 class="section-title">马匹列表</h2>
        </div>
        <p class="section-meta" id="horse-count">加载中...</p>
      </section>

      <section>
        <div class="status-box" id="home-status">正在读取马匹数据...</div>
        <div class="horse-grid" id="horse-grid"></div>
      </section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/horses.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
