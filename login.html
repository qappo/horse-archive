<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horse_Archive - 登录 / 注册</title>
  <link rel="icon" type="image/png" href="assets/rabbit2.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="button button-secondary" href="index.html">返回图鉴</a>
      <div class="header-actions" id="header-actions"></div>
    </header>

    <main class="page page-login">
      <section class="login-page-head">
        <p class="section-kicker">Account</p>
        <h1 class="section-title">登录 / 注册</h1>
      </section>

      <section class="auth-layout">
        <article class="auth-card">
          <p class="section-kicker">Login</p>
          <h2 class="section-title">用户登录</h2>
          <form id="login-form" class="auth-form">
            <label class="field-label" for="login-username">用户名</label>
            <input id="login-username" type="text" placeholder="请输入用户名" required>
            <label class="field-label" for="login-password">密码</label>
            <input id="login-password" type="password" placeholder="请输入密码" required>
            <button class="button" type="submit">登录</button>
          </form>
        </article>

        <article class="auth-card">
          <p class="section-kicker">Register</p>
          <h2 class="section-title">新用户注册</h2>
          <form id="register-form" class="auth-form">
            <label class="field-label" for="register-username">用户名</label>
            <input id="register-username" type="text" placeholder="设置用户名" required>
            <label class="field-label" for="register-password">密码</label>
            <input id="register-password" type="password" placeholder="设置密码" required>
            <label class="field-label" for="register-confirm-password">确认密码</label>
            <input id="register-confirm-password" type="password" placeholder="再次输入密码" required>
            <button class="button" type="submit">注册</button>
          </form>
        </article>
      </section>

      <div class="status-box" id="auth-status">请输入用户名和密码。</div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
